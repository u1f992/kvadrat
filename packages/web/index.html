<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kvadrat</title>
    <script src="coi-serviceworker.min.js"></script>
  </head>
  <body>
    <h1>kvadrat <small id="version"></small></h1>
    <form id="form" onsubmit="return false">
      <div>
        <label for="file">Image:</label>
        <input type="file" id="file" accept="image/*" required />
      </div>
      <div>
        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="polygon">polygon</option>
          <option value="rectangle">rectangle</option>
          <option value="css-background">css-background</option>
        </select>
      </div>
      <div>
        <label for="material">Material:</label>
        <select id="material" disabled>
          <option value="linear-gradient">linear-gradient</option>
          <option value="svg">svg</option>
        </select>
      </div>
      <div>
        <label for="selector">Selector:</label>
        <input type="text" id="selector" value=".image" disabled />
      </div>
      <div>
        <label><input type="checkbox" id="rgba" /> Use #RRGGBBAA instead of fill-opacity</label>
      </div>
      <button type="submit" id="run">Run</button>
    </form>
    <div id="info"></div>
    <div id="result"></div>

    <script type="module">
      import {
        layeredDecompose,
        renderAsSVGPolygon,
        renderAsSVGRect,
        renderAsCSSBackground,
      } from "./index.js";
      import { VERSION } from "./version.js";

      document.getElementById("version").textContent = "v" + VERSION;

      const form = document.getElementById("form");
      const fileInput = document.getElementById("file");
      const modeSelect = document.getElementById("mode");
      const materialSelect = document.getElementById("material");
      const selectorInput = document.getElementById("selector");
      const runButton = document.getElementById("run");
      const result = document.getElementById("result");

      const rgbaCheckbox = document.getElementById("rgba");

      function updateDisabledState() {
        const isCss = modeSelect.value === "css-background";
        materialSelect.disabled = !isCss;
        selectorInput.disabled = !isCss;
        rgbaCheckbox.disabled = isCss;
      }
      modeSelect.addEventListener("change", updateDisabledState);
      updateDisabledState();

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
            resolve({
              width: canvas.width,
              height: canvas.height,
              bitmap: { data: new Uint8Array(imageData.data.buffer) },
            });
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("Failed to load image"));
          };
          img.src = url;
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        result.innerHTML = "";
        document.getElementById("info").textContent = "";

        const file = fileInput.files[0];
        if (!file) return;

        runButton.disabled = true;
        runButton.textContent = "Processing...";
        try {
          const image = await loadImage(file);
          const t0 = performance.now();
          const { layers } = await layeredDecompose(image);
          const dt = performance.now() - t0;
          document.getElementById("info").textContent = `${image.width}x${image.height}, ${layers.length} layers, ${layers.reduce((s,l) => s + l.rects.length, 0)} rects, ${dt.toFixed(0)}ms`;
          const mode = modeSelect.value;

          if (mode === "css-background") {
            const selector = selectorInput.value || ".image";
            const material = materialSelect.value;

            const previewCss = renderAsCSSBackground(
              layers, image.width, image.height,
              { selector: ".image", material },
            );
            const css = renderAsCSSBackground(
              layers, image.width, image.height,
              { selector, material },
            );

            const style = document.createElement("style");
            style.textContent = previewCss;
            result.appendChild(style);
            const div = document.createElement("div");
            div.className = "image";
            result.appendChild(div);

            const textarea = document.createElement("textarea");
            textarea.value = css;
            textarea.rows = 20;
            textarea.cols = 80;
            textarea.readOnly = true;
            result.appendChild(textarea);
          } else {
            const svgOptions = { fillOpacity: !document.getElementById("rgba").checked };
            const svg =
              mode === "rectangle"
                ? renderAsSVGRect(layers, image.width, image.height, svgOptions)
                : renderAsSVGPolygon(layers, image.width, image.height, svgOptions);
            const div = document.createElement("div");
            div.innerHTML = svg;
            result.appendChild(div);
          }
        } finally {
          runButton.disabled = false;
          runButton.textContent = "Run";
        }
      });
    </script>
  </body>
</html>
