name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # to generate release note

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # TODO: remove --legacy-peer-deps once typescript-eslint supports TS6 (see package.json)
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      # Tests use full hardware concurrency and are expensive on CI runners.
      # Run locally before tagging.
      # - run: npm test
      - run: npm pack
      - run: |
          gh release create "${VERSION}" --title "${VERSION}" --generate-notes
          gh release upload "${VERSION}" *.tgz
        env:
          GH_TOKEN: ${{ github.token }}
